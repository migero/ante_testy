<body>

<body class="loading">
	<div id="loading" >
			<img alt="ar.js logo" src="logo.gif" />
			<span class="loading-text">Loading, please wait</span>
	</div>
  <!--
  ==================
  STATS
  ==================
  -->

      <div id="stats" class="ui stats">

          <div id="stats1" class="stats-item">
              <p class="stats-item-title">
                  Main
              </p>
          </div>

          <div id="stats2" class="stats-item">
              <p class="stats-item-title">
                  Worker
              </p>
          </div>

      </div>

  <!--
  ==================

  ==================

      <div id="app">
          <video

              autoplay
              muted
              playsinline

          </video>

          <canvas id="canvas"></canvas>
      </div>


		<script src="js/three.min.js"></script>
		<script src="js/stats.min.js"></script>
    <script src="js/GLTFLoader.js"></script>
    <script src="js/threejs_filter_worker_gltf.js"></script>
		<script src="js/nftLoader_light.js"></script>

    <script>
     /**
      * APP / ELEMENTS
      */
     var container = document.getElementById( 'app' );
     var video = document.getElementById( 'video' );
     var canvas = document.getElementById( 'canvas' );

     nftLoader(container, video, 320, 240, canvas, "pinball", true);
