<!DOCTYPE html>
<html>
<!-- Added by HTTrack --><meta http-equiv="content-type" content="text/html;charset=utf-8" /><!-- /Added by HTTrack -->
<head>
	<meta charset="utf-8">
	<title>NFT marker example with a WebWorker and Three.js</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=1">
	<link rel="stylesheet" href="nft-style.css">
</head>
<body>

     

    <script src="stats.min.js"></script>
    <script src="three.min.js"></script>
		<script src="arNFT.min.js"></script>

    <script>

			var nft = new ARnft(640, 480, 'config.json');

			nft.init("pinball", true);

			var mat = new THREE.MeshLambertMaterial({color: 0xff0000});
			var cubeGeom = new THREE.CubeGeometry(1,1,1);
			var cube = new THREE.Mesh(cubeGeom, mat);
			cube.position.z = 90;
			cube.position.x = 90;
			cube.position.y = 90;
			cube.scale.set(180,180,180);

			nft.add(cube);

    </script>
</body>

</html>
