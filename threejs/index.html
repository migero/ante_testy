<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>NFT marker example with a WebWorker and Three.js</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=1">
	<link rel="stylesheet" href="nft-style.css">
</head>
<body>

     

    <script src="stats.min.js"></script>
    <script src="three.min.js"></script>
		<script src="arNFT.min.js"></script>
		<script src='../GLTFLoader.js'></script>

    <script>

			var nft = new ARnft(640, 480, 'config.json');

			nft.init("pinball", true);
			var threeGLTFLoader = new THREE.GLTFLoader();
			var model;

			threeGLTFLoader.load("model\model1.glb", function (gltf) {
            model = gltf.scene.children[0];
            model.name = 'Model';

            var animation = gltf.animations[0];
            var mixer = new THREE.AnimationMixer(model);
            mixers.push(mixer);
            var action = mixer.clipAction(animation);
            action.play();

            root.matrixAutoUpdate = false;
            root.add(model);

            model.position.z = 0;
            model.position.x = 0;
            model.position.y = 0;
			});
    </script>
</body>

</html>
