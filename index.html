<!DOCTYPE html>

<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	
	<title>NFT marker example with a WebWorker and Three.js</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=1">
	<link rel="stylesheet" href="nft-style.css">
</head>
<body><div id="stats" class="ui stats"><div id="stats1" class="stats-item"><p class="stats-item-title">Main</p><div style="position: fixed; top: 0px; left: 0px; cursor: pointer; opacity: 0.9; z-index: 10000;"><canvas width="80" height="48" style="width: 80px; height: 48px; display: block;"></canvas><canvas width="80" height="48" style="width: 80px; height: 48px; display: none;"></canvas><canvas width="80" height="48" style="width: 80px; height: 48px; display: none;"></canvas></div></div><div id="stats2" class="stats-item"><p class="stats-item-title">Worker</p><div style="position: fixed; top: 0px; left: 0px; cursor: pointer; opacity: 0.9; z-index: 10000;"><canvas width="80" height="48" style="width: 80px; height: 48px; display: block;"></canvas><canvas width="80" height="48" style="width: 80px; height: 48px; display: none;"></canvas><canvas width="80" height="48" style="width: 80px; height: 48px; display: none;"></canvas></div></div></div><div id="app"><video id="video" autoplay="" muted="" playsinline=""></video><canvas id="canvas"></canvas></div><div id="loading"><img src="./index_files/arNFT-logo.gif" alt="arNFT.js logo"><span class="loading-text">Loading, please wait...</span></div>

      <a href="https://raw.githubusercontent.com/artoolkitx/artoolkit5/master/doc/Marker%20images/pinball.jpg" class="ui marker" target="_blank">
          🖼 Marker Image
      </a>

    <script src="stats.min.js.download"></script>
    <script src="three.min.js.download"></script>
		<script src="arNFT.min.js.download"></script>

    <script>

			var nft = new ARnft(640, 480, 'config.json');

			nft.init("dmg01_marker_008", true);

			var mat = new THREE.MeshLambertMaterial({color: 0xff0000});
			var cubeGeom = new THREE.CubeGeometry(1,1,1);
			var cube = new THREE.Mesh(cubeGeom, mat);
			cube.position.z = 90;
			cube.position.x = 90;
			cube.position.y = 90;
			cube.scale.set(180,180,180);

			nft.add(cube);

    </script>



</body></html>
